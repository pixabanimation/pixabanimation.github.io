<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — PixabAnimation</title>
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://pixabanimation.github.io/404.html">
<link rel="icon" type="image/png" href="assets/pixabanimation-logo.png" sizes="32x32">
<script>
  // GitHub Pages SPA redirect: store the path and go to root
  (function() {
    var path = window.location.pathname;
    if (path && path !== '/' && path !== '/404.html') {
      sessionStorage.setItem('spa_redirect', path);
      window.location.replace('/');
    }
  })();
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 520px;
    text-align: center;
  }
  .logo {
    width: 48px;
    height: auto;
    margin-bottom: 32px;
    display: inline-block;
  }
  h1 {
    font-size: 5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #0066cc, #2997ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: -0.05em;
  }
  h2 {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 12px;
    color: #1d1d1f;
    letter-spacing: -0.02em;
  }
  p {
    font-size: 1rem;
    color: rgba(0,0,0,0.56);
    margin-bottom: 32px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    background: #0066cc;
    color: white;
    border-radius: 9999px;
    font-weight: 600;
    font-size: 0.95rem;
    text-decoration: none;
    transition: all 0.2s ease;
  }
  .btn:hover {
    background: #0071e3;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,102,204,0.3);
  }
  .btn-secondary {
    background: transparent;
    color: #0066cc;
    border: 1px solid rgba(0,102,204,0.3);
  }
  .btn-secondary:hover {
    background: rgba(0,102,204,0.06);
    box-shadow: none;
  }
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }
  .links {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    padding-top: 24px;
    border-top: 1px solid rgba(0,0,0,0.06);
  }
  .links a {
    color: rgba(0,0,0,0.48);
    text-decoration: none;
    font-size: 0.85rem;
    transition: color 0.2s;
  }
  .links a:hover {
    color: #0066cc;
  }
  .search-hint {
    font-size: 0.85rem;
    color: rgba(0,0,0,0.4);
    margin-top: 12px;
  }
</style>
</head>
<body>
  <div class="container">
    <img src="assets/pixabanimation-logo.png" alt="PixabAnimation Logo" class="logo" width="48" height="42">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.<br>Let's get you back on track.</p>
    
    <div class="actions">
      <a href="./" class="btn"><i class="fas fa-home" style="font-size:0.85rem"></i> Go Home</a>
      <a href="./#/shop" class="btn btn-secondary"><i class="fas fa-store" style="font-size:0.85rem"></i> Browse Shop</a>
    </div>

    <div class="links">
      <a href="./#/about">About</a>
      <a href="./#/contact">Contact</a>
      <a href="./#/privacy-policy">Privacy Policy</a>
      <a href="./#/terms-of-use">Terms of Use</a>
    </div>

    <p class="search-hint">Try searching for what you need using the search bar on our homepage.</p>
  </div>

  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</body>
</html>
